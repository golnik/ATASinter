<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATAS model</title>
  <!-- plot.ly -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.7.4/dist/css/foundation.min.css"> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Including Font Awesome -->
  <link rel="stylesheet" href="style.css"/> 

  <script src="math.js"></script>

  <script src="script.js"></script>
</head>

<body onload="plot()">
  <div class="container">
    <div class="d-flex">
      <div class="leftpane">
        <img class="img-wrap" src="diagram.svg"></img>
      </div>
      <div class="rightpane">
        <div class="range">
          <input type="range" id="sD1" onchange="plot()" style="background-color: rgb(255, 0, 0);" type="range" min="-1.0" max="1.0" value="1.0" step=".1" /> 
          <div class="value" id="vD1"></div>
        </div>
        <div class="range">
          <input type="range" id="sD2" onchange="plot()" style="background-color: rgb(0, 0, 255);" type="range" min="-1.0" max="1.0" value="1.0" step=".1" /> 
          <div class="value" id="vD2"></div>
        </div>
        <div class="range">
          <input type="range" id="sD3" onchange="plot()" style="background-color: rgb(0, 150, 0);" type="range" min="-1.0" max="1.0" value="1.0" step=".1" /> 
          <div class="value" id="vD3"></div>
        </div>
        <div class="range">
          <input type="range" id="sD4" onchange="plot()" style="background-color: rgb(255, 0, 255);" type="range" min="-1.0" max="1.0" value="1.0" step=".1" /> 
          <div class="value" id="vD4"></div>
        </div>
      </div>
    </div>
    
    <div class="bottompane">
      <div class="plot" id="myDiv"></div>
    </div>
  </div>

  <script>
    function plot(){
      D1I1F = document.getElementById("sD1").value;
      D1I2F = document.getElementById("sD2").value;
      D2I1F = document.getElementById("sD3").value;
      D2I2F = document.getElementById("sD4").value;

      document.getElementById("vD1").innerHTML = D1I1F;
      document.getElementById("vD2").innerHTML = D1I2F;
      document.getElementById("vD3").innerHTML = D2I1F;
      document.getElementById("vD4").innerHTML = D2I2F;

      plot_spec(D1I1F,D1I2F,D2I1F,D2I2F);
    }
  </script>
</body>
</html>
